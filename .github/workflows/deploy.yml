name: Deploy to Firebase

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - production
          - all

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.target }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # --- Demo deploy ---
      - name: Build (demo)
        if: github.event.inputs.target == 'demo' || github.event.inputs.target == 'all'
        run: npx vite build --mode demo

      - name: Deploy demo hosting
        if: github.event.inputs.target == 'demo' || github.event.inputs.target == 'all'
        run: firebase deploy --only hosting:demo --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # --- Production deploy ---
      - name: Build (production)
        if: github.event.inputs.target == 'production' || github.event.inputs.target == 'all'
        env:
          VITE_APP_MODE: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_PAY_ID_NAME: ${{ secrets.VITE_PAY_ID_NAME }}
          VITE_PAY_ID_EMAIL: ${{ secrets.VITE_PAY_ID_EMAIL }}
        run: npx vite build --mode production

      - name: Deploy production hosting
        if: github.event.inputs.target == 'production' || github.event.inputs.target == 'all'
        run: firebase deploy --only hosting:production --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'production' || github.event.inputs.target == 'all'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install & build functions
        run: cd functions && npm ci && npm run build

      - name: Deploy functions
        run: firebase deploy --only functions --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
