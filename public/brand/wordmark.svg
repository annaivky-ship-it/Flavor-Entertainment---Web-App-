<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="The Private Book — Perth">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:wght@900&family=Jost:wght@300&display=swap');
      .script { font-family: 'Pinyon Script', cursive; font-weight: 400; fill: #FFFFFF; }
      .display { font-family: 'Playfair Display', Georgia, serif; font-weight: 900; fill: #FFFFFF; letter-spacing: 0.04em; }
      .tag { font-family: 'Jost', system-ui, sans-serif; font-weight: 300; fill: #FFFFFF; letter-spacing: 0.35em; }
    ]]></style>
  </defs>
  <rect width="800" height="360" fill="#000000"/>
  <text x="400" y="130" text-anchor="middle" class="script" font-size="100">The</text>
  <text x="400" y="240" text-anchor="middle" class="display" font-size="92">PRIVATE BOOK</text>
  <text x="400" y="298" text-anchor="middle" class="tag" font-size="20">PERTH</text>
